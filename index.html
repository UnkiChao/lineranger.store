<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Line Ranger 帳號</title>
    <style>
        :root { --primary-color: #ffcf00; --bg-dark: #121212; --card-bg: #2a2a2a; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #e0e0e0; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 80px; 
            scroll-behavior: smooth; /* 讓跳轉變斯滑 */
        }

        /* 頂部導覽列優化 */
        .sticky-header { 
            width: 100%; 
            background-color: rgba(31, 31, 31, 0.95); 
            backdrop-filter: blur(10px);
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            padding: 10px 0;
        }

        .toolbar { 
            width: 95%; 
            max-width: 1200px; 
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* 左、中、右配置 */
            align-items: center;
            gap: 10px;
        }

        /* 左邊：跳轉按鈕 */
        .left-group { display: flex; gap: 8px; }
        
        /* 中間：核心功能 */
        .center-group { display: flex; gap: 10px; justify-content: center; }

        button { 
            padding: 10px 16px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.2s;
            white-space: nowrap;
        }

        .nav-btn { background-color: #333; color: #aaa; }
        .nav-btn:active { transform: scale(0.95); }
        
        #searchBtn { background-color: var(--primary-color); color: #000; min-width: 120px; }
        .clear-btn { background-color: #444; color: #fff; }

        /* 選取預覽區 */
        .selected-preview { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            width: 95%; 
            margin: 8px auto 0;
            padding: 5px 0;
            scrollbar-width: none; /* 隱藏滾動條 */
        }
        .selected-preview::-webkit-scrollbar { display: none; }
        .preview-item { width: 35px; height: 35px; border-radius: 4px; border: 1px solid var(--primary-color); flex-shrink: 0; object-fit: contain; background: #000; }

        /* 區塊標題 */
        .section-title { 
            width: 90%; 
            max-width: 1400px; 
            margin: 30px 0 15px; 
            font-size: 20px; 
            color: var(--primary-color); 
            border-left: 5px solid var(--primary-color); 
            padding-left: 12px;
            scroll-margin-top: 130px; /* 修正跳轉後的停靠位置 */
        }

        /* 網格系統優化 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
            width: 95%; 
            max-width: 1400px; 
        }

        .card { 
            background-color: var(--card-bg); 
            border: 2px solid #333; 
            border-radius: 12px; 
            cursor: pointer; 
            overflow: hidden; 
            position: relative;
            transition: 0.2s;
        }
        
        .card.selected { border-color: var(--primary-color); background-color: #353535; }
        .card img { width: 100%; height: 80px; object-fit: contain; padding: 8px; }
        .card .name { font-size: 10px; color: #ccc; padding: 5px; background: rgba(0,0,0,0.3); text-align: center; }

        /* 手機版 RWD 優化 */
        @media (max-width: 600px) {
            .toolbar { grid-template-columns: auto 1fr; } /* 手機版左按鈕與中間功能並列 */
            .left-group .nav-btn { padding: 8px 10px; font-size: 12px; }
            #searchBtn { font-size: 13px; padding: 8px 12px; }
            .clear-btn { padding: 8px 12px; font-size: 12px; }
            .grid { grid-template-columns: repeat(3, 1fr); } /* 手機版一排三隻 */
        }

        /* Toast 通知 */
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 50px; display: none; z-index: 2000; font-size: 14px; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="sticky-header">
        <div class="toolbar">
            <div class="left-group">
                <button class="nav-btn" onclick="scrollToId('rangersSection')">角色</button>
                <button class="nav-btn" onclick="scrollToId('equipSection')">裝備</button>
            </div>
            
            <div class="center-group">
                <button id="searchBtn">送出搜尋 (0)</button>
                <button class="clear-btn" onclick="clearAll()">清空</button>
            </div>

            <div class="right-group"></div>
        </div>
        
        <div class="selected-preview" id="previewBar"></div>
    </div>

    <div class="section-title" id="rangersSection">角色</div>
    <div id="rangersGrid" class="grid"></div>

    <div class="section-title" id="equipSection">裝備</div>
    <div id="equipGrid" class="grid"></div>

    <script src="data.js"></script>
    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        }

        function scrollToId(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        const rGrid = document.getElementById('rangersGrid');
        const eGrid = document.getElementById('equipGrid');

        // 生成卡片
        Object.keys(roleMap).forEach(id => {
            const name = roleMap[id];
            const type = id.startsWith('R') ? 'rangers' : 'equip';
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.id = id;
            card.innerHTML = `<img src="image/${type}/${name}.png" loading="lazy" onerror="this.src='image/placeholder.png'"><div class="name">${name}</div>`;
            card.onclick = function() { 
                this.classList.toggle('selected'); 
                updateUI(); 
            };
            (id.startsWith('R') ? rGrid : eGrid).appendChild(card);
        });

        function updateUI() {
            const selected = document.querySelectorAll('.card.selected');
            document.getElementById('searchBtn').innerText = `送出搜尋 (${selected.length})`;
            
            const preview = document.getElementById('previewBar');
            preview.innerHTML = '';
            selected.forEach(c => {
                const img = document.createElement('img');
                img.src = c.querySelector('img').src;
                img.className = 'preview-item';
                preview.appendChild(img);
            });
        }

        function clearAll() { 
            document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected')); 
            updateUI(); 
            showToast("已清空選取");
        }

        document.getElementById('searchBtn').onclick = () => {
            const ids = Array.from(document.querySelectorAll('.card.selected')).map(c => c.dataset.id);
            if(ids.length > 0) window.location.href = `search_result.html?tags=${ids.join(',')}`;
            else showToast("請至少選擇一個項目");
        };
    </script>
</body>
</html>
